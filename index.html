<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1 {
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    label {
      display: flex;
      align-items: center;
      margin: 8px 0;
      cursor: pointer;
    }
    input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.3);
    }
    .done {
      text-decoration: line-through;
      color: #22c55e;
    }
  </style>
</head>
<body><h1>Daily Activity Tracker</h1><div class="card">
  <h2>Latihan Cardio</h2>
  <label><input type="checkbox">Mountain Climber - 44 detik x 4 set</label>
  <label><input type="checkbox">Jumping Jack - 44 detik x 4 set</label>
  <label><input type="checkbox">High Knees - 44 detik x 4 set</label>
  <label><input type="checkbox">Burpees - 44 detik x 4 set</label>
</div><div class="card">
  <h2>Perawatan Diri</h2>
  <label><input type="checkbox">Skincare</label>
  <label><input type="checkbox">Face Yoga</label>
</div><div class="card">
  <h2>Belajar</h2>
  <label><input type="checkbox">Baca Filsafat - 50 menit</label>
  <label><input type="checkbox">Muroja'ah Hafalan - 30 menit</label>
  <label><input type="checkbox">Mutola'ah Kitab Turats - 30 menit</label>
</div><div class="card">
  <h2>Bahasa</h2>
  <label><input type="checkbox">Kosa Kata Arab (min 30)</label>
  <label><input type="checkbox">Kosa Kata Inggris (min 30)</label>
</div><script>
  const checkboxes = document.querySelectorAll('input[type="checkbox"]');

  checkboxes.forEach((checkbox) => {
    checkbox.addEventListener('change', function() {
      if (this.checked) {
        this.parentElement.classList.add('done');
      } else {
        this.parentElement.classList.remove('done');
      }
    });
  });
</script></body>
</html>
